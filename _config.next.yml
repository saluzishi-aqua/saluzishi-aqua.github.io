# ===============================================================
# 飒露紫石 - 紫蓝渐变风格配置（多元主题拓展版）
# ===============================================================

# 主题核心配置
cache:
  enable: true
minify: false

# 自定义文件路径
custom_file_path:
  style: source/_data/styles.styl

# ---------------------------------------------------------------
# 配色方案 - 使用Pisces营造古典书卷气息
# ---------------------------------------------------------------
# 可选: Muse | Mist | Pisces | Gemini
scheme: Pisces

# 深色模式
darkmode: false

# ---------------------------------------------------------------
# 站点信息
# ---------------------------------------------------------------
favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png
  safari_pinned_tab: /images/logo.svg

# 知识共享协议
creative_commons:
  license: by-nc-sa
  size: small
  sidebar: true
  post: true
  language: deed.zh

# ---------------------------------------------------------------
# 菜单设置 - 多元主题：天文地理、生活风水、养生健康、术业学习、诗词歌赋
# ---------------------------------------------------------------
menu:
  首页: / || fa fa-home
  天文地理: /categories/天文地理/ || fa fa-star
  生活风水: /categories/生活风水/ || fa fa-yin-yang
  养生健康: /categories/养生健康/ || fa fa-heartbeat
  术业学习: /categories/术业学习/ || fa fa-graduation-cap
  诗词歌赋: /categories/诗词歌赋/ || fa fa-feather
  标签: /tags/ || fa fa-tags
  归档: /archives/ || fa fa-archive
  关于: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: true

# ---------------------------------------------------------------
# 侧边栏设置
# ---------------------------------------------------------------
sidebar:
  position: left
  width_expanded: 320
  width_dual_column: 240
  display: always
  padding: 18
  offset: 12

# 头像 - 使用紫色圆形
avatar:
  url: /images/avatar.svg
  rounded: true
  rotated: false

site_state: true

# 社交链接
social:
  GitHub: https://github.com/saluzishi-aqua || fab fa-github
  邮箱: mailto:saluzishi-aqua@gmail.com || fa fa-envelope
  RSS: /atom.xml || fa fa-rss

social_icons:
  enable: true
  icons_only: false
  transition: true

# 友情链接
links_settings:
  icon: fa fa-globe
  layout: block

links:
  中国传统文化网: https://www.zhongguoguzhi.com
  中医养生网: https://www.zhongyiyangsheng.com
  国学网: http://www.guoxue.com

# 目录
toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 4

# ---------------------------------------------------------------
# 页脚设置
# ---------------------------------------------------------------
footer:
  since: 2024
  icon:
    name: fa fa-heart
    animated: true
    color: "#8B4513"
  copyright: 墨客
  powered: true
  beian:
    enable: false

# ---------------------------------------------------------------
# 文章设置
# ---------------------------------------------------------------
excerpt_description: true
# 文章摘要长度
excerpt_length: 300
# 显示"阅读全文"按钮
read_more_btn: true

# 文章版权信息
post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ---------------------------------------------------------------
# 代码高亮
# ---------------------------------------------------------------
codeblock:
  copy_button:
    enable: true
    style: flat

# 禁用highlight.js
vendors:
  highlight: false

# ---------------------------------------------------------------
# 搜索
# ---------------------------------------------------------------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# ---------------------------------------------------------------
# 评论系统 (可选)
# ---------------------------------------------------------------
comments:
  style: tabs
  active:
  storage: true
  lazyload: false
  nav:

# ---------------------------------------------------------------
# 统计分析 (可选)
# ---------------------------------------------------------------
# 不启用任何统计，保持简洁

# ---------------------------------------------------------------
# 其他设置
# ---------------------------------------------------------------
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

bookmark:
  enable: false

github_banner:
  enable: false
