<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6D28D9" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="60" cy="60" r="56" fill="url(#purpleGradient)" filter="url(#shadow)"/>

  <!-- 内部装饰圆环 -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- 简约文字/符号装饰 -->
  <text x="60" y="68" font-family="serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="500">墨</text>

  <!-- 底部小装饰点 -->
  <circle cx="60" cy="85" r="3" fill="rgba(255,255,255,0.6)"/>
</svg>